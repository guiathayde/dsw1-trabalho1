# Test Datasource Configuration
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Hibernate properties for H2
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=true # Uncomment to see SQL queries during tests

# Disable Flyway for tests if it's not needed or configured for H2
# spring.flyway.enabled=false

# Disable Liquibase for tests if it's not needed or configured for H2
# spring.liquibase.enabled=false

# Ensure Spring Boot uses a different server port for tests to avoid conflicts if main app is running
# server.port=0 # 0 means random available port

# Devtools (optional, can be useful for some test scenarios but often disabled for CI)
# spring.devtools.restart.enabled=false
# spring.devtools.livereload.enabled=false
